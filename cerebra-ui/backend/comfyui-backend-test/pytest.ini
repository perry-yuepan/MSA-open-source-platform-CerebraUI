[pytest]
# Pytest configuration for CerebraUI Backend Tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    --durations=10
    --cov=.
    --cov-report=html:results/coverage
    --cov-report=term-missing
    --html=results/report.html
    --self-contained-html
    --junit-xml=results/junit.xml

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    performance: Performance benchmarks
    e2e: End-to-end tests (full system)
    slow: Tests that take more than 1 second
    smoke: Quick smoke tests
    comfyui: Tests specific to ComfyUI integration
    fal: Tests specific to Fal integration
    prompt_analyzer: Tests for PromptAnalyzer
    database: Tests requiring database

# Timeout settings
timeout = 300
timeout_method = thread

# Test paths
testpaths = 
    unit
    integration
    performance
    e2e

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage settings
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False