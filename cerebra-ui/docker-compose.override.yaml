services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_HASH: local
    image: cerebra-ui:local
    pull_policy: never
    depends_on:
      - redis
    environment:
      - STATIC_DIR=/app/static
      - BETTERAUTH_BASE_URL=http://betterauth-service-betterauth-1:4000
      - BETTERAUTH_URL=http://betterauth-service-betterauth-1:4000
      - CORS_ALLOW_ORIGIN=http://localhost:3000
      - WEBUI_SESSION_COOKIE_SAME_SITE=lax
      - WEBUI_SESSION_COOKIE_SECURE=false
      - WEBUI_AUTH=true
      - ENCRYPTION_KEY=sWMJ67yu2VQKjtC2NlMNRXA9hy9TOneLC1Ejn3ZqmjY=
      - ENABLE_CHAT_CACHE=true
      - CHAT_CACHE_MAX_RECENT=3
      - CHAT_CACHE_TTL_SECONDS=900
      - VITE_TURNSTILE_SITE_KEY=0x4AAAAAAB_PiFsl7ULRbFMP
      - TURNSTILE_SECRET_KEY=0x4AAAAAAB_PiECN3dcLlCc-izpMEjuEw_g

    volumes:
      - ./build:/app/build:ro
      - ./backend:/app/backend:ro
      - ./static:/app/static:ro
    networks:
      - default
      - cerebra_net

  langflow:
    image: langflowai/langflow:latest
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:///langflow.db
      - LANGFLOW_SECRET_KEY=MpuIqzf51LX7KLyjAU-2GCO1CPkVWOI0BrJnZisOgTI=
      - LANGFLOW_AUTO_LOGIN=true
      - LANGFLOW_SKIP_AUTH_AUTO_LOGIN=true
    volumes:
      - langflow-data:/app/langflow
    networks:
      - default
      - cerebra_net

  deep-research:
    build:
      context: ../open_deep_research
      dockerfile: Dockerfile
    ports:
      - "2024:2024"
    env_file:
      - ../open_deep_research/.env
    networks:
      - default
      - cerebra_net

networks:
  cerebra_net:
    external: true

volumes:
  langflow-data:
